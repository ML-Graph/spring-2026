# Site settings
course_name: Advanced ML for Generative AI
course_description: "This course covers advanced machine learning techniques with a focus on generative AI. Topics include transformer architectures, large language models, diffusion models, multimodal learning, RLHF, RAG, and agentic systems. Students will engage with both the theoretical foundations and practical applications of modern generative AI."
course_semester: "Spring-2026"

baseurl: "/spring-2026" # the subpath of your site, e.g. /blog/
url: "http://ML-Graph.github.io/" # the base hostname & protocol for your site

schoolname: "Department of Computer Science, University of Oregon"
schoolurl: "https://scds.uoregon.edu/cs"
twitter_username: username 

address: |
    University of Oregon
    Department of Computer Science
    Eugene, Oregon

# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
# google_analytics: UA-XXXXXXXX-X

### Do not change the followings unless you know what you are doing ###

# Build settings
markdown: kramdown

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%m/%d/%Y"

future: true
collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false


defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
